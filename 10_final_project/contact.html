<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Rohit Saini">
    <meta name="description"
        content="Get your spicy samosa fix! Order online for a delicious and fiery experience. Wide variety, fresh ingredients, and fast delivery.">
    <title>Contact Us</title>
    <link rel="shortcut icon" href="./favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Contact Us</h1>
        <nav>
            <ul>
                <li><a href="./index.html">Home</a></li>
                <li>
                    <a href="./index.html#about">
                        About <abbr title="Spicy Samosa Shop">SSS</abbr>
                    </a>
                </li>
                <li> <a href="./index.html#menu">Our Menu</a></li>
                <li><a href="./hours.html">Store Hours</a></li>
            </ul>
        </nav>
        <article>
            <figure>
                <img src="./img/sss-samosa.jpg" alt="spicy samosa shop offering" width="400" title="A samosa Fiest">
                <figcaption>Spicy Samosa Shop Specials</figcaption>
            </figure>
    </header>
    <main>
        <article>
            <section>
                <h2>Our Contact Form</h2>
                <form action="https://httpbin.org" method="post">
                    <fieldset>
                        <legend>Send Us A Message</legend>
                        <p>
                            <label for="name">Name:</label>
                            <input type="text" name="name" id="name" placeholder="your name" autocomplete="on" required>
                        </p>
                        <p>
                            <label for="email">Email:</label>
                            <input type="email" name="email" id="email" placeholder="your email" autocomplete="on"
                                required>
                        </p>
                        <p>
                            <label for="message">Your Message:</label>
                            <br>
                            <textarea name="message" id="message" cols="30" rows="10"
                                placeholder="Type your message here"></textarea>
                        </p>
                    </fieldset>
                    <button type="submit">Submit</button>
                    <button type="reset">Reset</button>
                </form>
            </section>

            <section>
                <h2>Our Location</h2>
                <address>
                    ABC street,
                    <br>
                    New Delhi, India
                    <br>
                    <p>Phone: <a href="tel">1234567890</a></p>
                </address>
                <a href="#">Back to Top</a>
            </section>
        </article>
    </main>

    <hr>

    <footer>
        <p>Copyright &copy; The Spicy Samosa Shop</p>
    </footer>
</body>

</html>
